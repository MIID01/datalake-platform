apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: datalake-ai-inference
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 4
      timeoutSeconds: 300
      serviceAccountName: 808056940626-compute@developer.gserviceaccount.com
      containers:
        - image: gcr.io/datalake-production-sa/ai-inference:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "8"
              memory: 32Gi
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:8080"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
